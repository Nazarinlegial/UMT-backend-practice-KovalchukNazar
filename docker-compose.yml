# Full local stack for the Flora backend.
#   docker compose up -d postgres   → just the database (for `npm run dev`)
#   docker compose up --build       → database + API together
services:
  postgres:
    image: postgres:18-alpine
    container_name: flora-postgres
    restart: unless-stopped
    ports:
      # Host 5435 → container 5432. 5435 avoids clashing with any Postgres
      # already bound to 5432/5433 on the host machine.
      - "5435:5432"
    environment:
      POSTGRES_USER: flora
      POSTGRES_PASSWORD: flora
      POSTGRES_DB: flora
    volumes:
      # postgres:18 expects the mount at /var/lib/postgresql (the parent).
      - flora_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flora -d flora"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: flora-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4000}
      DATABASE_URL: "postgresql://flora:flora@postgres:5432/flora?schema=public"
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-6}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-flora}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "3001:3001"
    # Apply migrations on boot, then start the API. (Seed once afterwards with
    # `docker compose exec backend npm run seed`.)
    command: sh -c "npx prisma migrate deploy && node src/server.js"

volumes:
  flora_postgres_data:
