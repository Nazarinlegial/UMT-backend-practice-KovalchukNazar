# Render Blueprint — one-click deploy of the Flora API + managed PostgreSQL.
# In Render: New → Blueprint → point at this repo. Set the Cloudinary secrets
# (marked sync:false) in the dashboard after the first deploy.
services:
  - type: web
    name: flora-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: flora-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false # e.g. https://<user>.github.io
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: flora
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random secret
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false # set in the Render dashboard

databases:
  - name: flora-db
    plan: free
